name: Tourism Wellness MLOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'

jobs:
  data-preparation:
    name: Data Preparation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install pandas numpy scikit-learn huggingface_hub datasets
      - run: python scripts/data_preparation.py
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
      - uses: actions/upload-artifact@v3
        with:
          name: processed-data
          path: Visit_with_Us/data/
          retention-days: 7

  model-training:
    name: Model Training
    runs-on: ubuntu-latest
    needs: data-preparation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install scikit-learn xgboost mlflow pandas numpy huggingface_hub datasets
      - uses: actions/download-artifact@v3
        with:
          name: processed-data
          path: Visit_with_Us/data/
      - run: python scripts/model_training.py
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
      - uses: actions/upload-artifact@v3
        with:
          name: model-artifacts
          path: Visit_with_Us/models/
          retention-days: 30

  model-deployment:
    name: Deploy to Hugging Face Spaces
    runs-on: ubuntu-latest
    needs: model-training
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install huggingface_hub
      - uses: actions/download-artifact@v3
        with:
          name: model-artifacts
          path: Visit_with_Us/models/
      - run: python Visit_with_Us/deployment/deploy_to_hf.py
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
